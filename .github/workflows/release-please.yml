name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-major-tag:
    name: Update floating major tag
    needs: release-please
    # Only run when release-please actually created a release (not just a PR).
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch all tags so we can move the major tag correctly.
          fetch-depth: 0
          fetch-tags: true

      - name: Move major tag to the new release
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: ${{ needs.release-please.outputs.major }}
        run: |
          MAJOR_TAG="v${MAJOR}"
          echo "Pointing ${MAJOR_TAG} at ${TAG_NAME}"

          # Delete the remote major tag if it exists, then recreate it.
          git tag -d "${MAJOR_TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${MAJOR_TAG}" 2>/dev/null || true

          # Create a lightweight tag at the commit the release tag points to.
          git tag "${MAJOR_TAG}" "${TAG_NAME}"
          git push origin "${MAJOR_TAG}"
