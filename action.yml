name: "Deploy to Pipecat Cloud"
description: "Build and deploy your Pipecat agent to Pipecat Cloud"
author: "Daily"

branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  # Required
  api-key:
    description: "Pipecat Cloud Private API key (not a Public key)"
    required: true
  agent-name:
    description: "Name of the agent to deploy"
    required: true
  # Cloud build options
  cloud-build:
    description: "Enable Pipecat Cloud Build (builds the image in the cloud)"
    required: false
    default: "false"
  build-context:
    description: "Build context directory path"
    required: false
    default: "."
  dockerfile:
    description: "Path to the Dockerfile (relative to build context)"
    required: false
    default: "Dockerfile"
  build-id:
    description: "Reuse an existing Pipecat Cloud Build ID (skips build step)"
    required: false
  build-timeout:
    description: "Max seconds to wait for cloud build completion"
    required: false
    default: "600"

  # Pre-built image (alternative to cloud build)
  image:
    description: >
      Pre-built Docker image reference with tag (e.g. ghcr.io/my-org/my-bot:v1.2.3).
      Not needed when using cloud-build or build-id.
    required: false
  image-credentials:
    description: "Name of the image pull secret set in Pipecat Cloud (not needed for cloud builds)"
    required: false

  # Deploy options
  secret-set:
    description: "Name of the secret set for runtime secrets"
    required: false
  region:
    description: "Deployment region (uses org default if omitted)"
    required: false
  min-agents:
    description: "Minimum agents to keep warm"
    required: false
    default: "0"
  max-agents:
    description: "Maximum concurrent agents"
    required: false
    default: "10"
  agent-profile:
    description: "Agent profile name"
    required: false
  enable-managed-keys:
    description: "Enable managed keys"
    required: false
    default: "false"
  wait-for-ready:
    description: "Whether to poll until deployment is ready"
    required: false
    default: "true"
  wait-timeout:
    description: "Max seconds to wait for deployment readiness"
    required: false
    default: "90"
  api-url:
    description: "Override the Pipecat Cloud API base URL"
    required: false
    default: "https://api.pipecat.daily.co"

outputs:
  build-id:
    description: "The Pipecat Cloud Build ID (when using cloud build)"
  service-name:
    description: "The deployed service/agent name"

runs:
  using: "node20"
  main: "dist/index.js"
